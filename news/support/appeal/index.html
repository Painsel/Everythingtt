<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit an Appeal - EverythingTT Support</title>
    <meta property="og:title" content="Submit an Appeal - EverythingTT Support" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://painsel.github.io/Everythingtt/news/support/appeal/" />
    <meta property="og:description" content="Submit an appeal regarding account restrictions or content moderation." />
    <meta property="og:image" content="https://painsel.github.io/Everythingtt/logo/EverythingTT.png" />
    <meta name="theme-color" content="#5865f2">
    <link rel="icon" href="../../../logo/EverythingTT.png">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../sidebar-shared.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="sidebar-layout">
    <div class="dashboard-container">
        <!-- Sidebar Toggle Button -->
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
            <span class="toggle-icon">☰</span>
        </button>

        <!-- Global Header Tools (Top Right) -->
        <div class="global-header-tools">
            <div class="ett-coins-display" title="Your ETT Coins">
                <img src="https://fdodsmjxbxknnqfnzdtr.supabase.co/storage/v1/object/public/AudiosAndNotifs/Tokens/valentine.gif" alt="ETT Coin" class="ett-coin-icon">
                <span id="ett-coins-count">0</span>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar collapsed">
            <div class="sidebar-brand">
                <img src="../../../logo/EverythingTT.png" class="sidebar-brand-img" alt="EverythingTT Logo">
                <span class="sidebar-brand-text">EverythingTT</span>
            </div>
            <div class="sidebar-header">
                <div id="logged-in-user" class="user-info">
                    <div class="side-pfp-wrapper">
                        <img id="side-pfp" src="" alt="PFP">
                        <div id="side-status-icon" class="status-icon"></div>
                    </div>
                    <div class="side-user-details">
                        <div class="side-username-row">
                            <span id="side-username"></span>
                            <div id="side-status-bubble" class="status-bubble" style="display: none;"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-links">
                    <a href="../../homepage/" class="nav-item">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">Dashboard</span>
                    </a>
                    <a href="../../articles/" class="nav-item">
                        <span class="nav-icon">📰</span>
                        <span class="nav-text">Explore Feed</span>
                    </a>
                    <a href="../../create-article/" class="nav-item">
                        <span class="nav-icon">✍️</span>
                        <span class="nav-text">Publish News</span>
                    </a>
                    <a href="../../homepage/settings/index.html" class="nav-item">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">Settings</span>
                    </a>
                    <a href="../index.html" class="nav-item active">
                        <span class="nav-icon">🎧</span>
                        <span class="nav-text">Support</span>
                    </a>
                    <a href="../../admin-panel/index.html" id="admin-nav-item" class="nav-item hidden">
                        <span class="nav-icon">🛡️</span>
                        <span class="nav-text">Admin</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button id="btn-logout" class="logout-btn-compact">
                    <span class="nav-icon">🚪</span>
                    <span class="nav-text">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header class="support-header">
                <div class="header-left">
                    <h1>Submit an Appeal</h1>
                    <p>Provide details about your case for our team to review.</p>
                </div>
            </header>

            <div class="appeal-form-container">
                <form id="appeal-form">
                    <div class="form-group">
                        <label for="appeal-subject">What are you appealing?</label>
                        <select id="appeal-subject" required>
                            <option value="" disabled selected>Select an option</option>
                            <option value="rule-violation">Rule Violation Appeal</option>
                            <option value="ip-ban">IP Ban Appeal</option>
                        </select>
                    </div>

                    <div id="sub-subject-container" class="form-group hidden">
                        <label for="appeal-sub-subject">Violation Category</label>
                        <select id="appeal-sub-subject">
                            <option value="" disabled selected>Select an option</option>
                            <option value="article">On an article</option>
                            <option value="account">On my account or a friend's account</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="user-id">User ID (Numerical)</label>
                        <input type="text" id="user-id" placeholder="e.g. 123456789" required>
                    </div>

                    <div class="form-group">
                        <label for="appeal-content">Explain your case</label>
                        <textarea id="appeal-content" rows="6" placeholder="Please provide as much detail as possible..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Evidence (Screenshots) - Min 1, Max 3</label>
                        <div class="image-upload-area" id="image-upload-area">
                            <input type="file" id="image-input" accept="image/*" multiple hidden>
                            <div class="upload-placeholder" id="upload-placeholder">
                                <span>📸 Click to upload images</span>
                                <small>You must attach at least one screenshot.</small>
                            </div>
                            <div class="image-preview-grid" id="image-preview-grid"></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-submit-appeal" class="btn-primary">Submit Appeal</button>
                        <a href="../index.html" class="btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="../../utils.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
