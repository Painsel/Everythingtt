<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - EverythingTT</title>
    <meta property="og:title" content="Profile Settings - EverythingTT" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://painsel.github.io/Everythingtt/news/profile-editor/" />
    <meta property="og:description" content="Customize your EverythingTT profile. Change your username, profile picture, and bio." />
    <meta name="theme-color" content="#5865f2">
    <link rel="icon" href="../../logo/EverythingTT.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../sidebar-shared.css">
    <link rel="stylesheet" href="style.css">
    <!-- Cropper.js for BETA cropping tool -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>
<body class="sidebar-layout">
    <div class="dashboard-container">
        <!-- Sidebar Toggle Button -->
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
            <span class="toggle-icon">☰</span>
        </button>

        <!-- Sidebar -->
        <aside class="sidebar collapsed">
            <div class="sidebar-brand">
                <img src="../../logo/EverythingTT.png" class="sidebar-brand-img" alt="EverythingTT Logo">
                <span class="sidebar-brand-text">EverythingTT</span>
            </div>
            <div class="sidebar-header">
                <div id="logged-in-user" class="user-info">
                    <div class="side-pfp-wrapper">
                        <img id="side-pfp" src="" alt="PFP">
                        <div id="side-status-icon" class="status-icon"></div>
                    </div>
                    <div class="side-user-details">
                        <div class="side-username-row">
                            <span id="side-username"></span>
                            <div id="side-status-bubble" class="status-bubble" style="display: none;"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-links">
                    <a href="../homepage/" class="nav-item">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-text">Dashboard</span>
                    </a>
                    <a href="../articles/" class="nav-item">
                        <span class="nav-icon">📰</span>
                        <span class="nav-text">Explore Feed</span>
                    </a>
                    <a href="../create-article/" class="nav-item">
                        <span class="nav-icon">✍️</span>
                        <span class="nav-text">Publish News</span>
                    </a>
                    <a href="#" class="nav-item active">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">Settings</span>
                    </a>
                    <a href="../admin-panel/index.html" id="admin-nav-item" class="nav-item hidden">
                        <span class="nav-icon">🛡️</span>
                        <span class="nav-text">Admin</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button id="btn-logout" class="logout-btn-compact">
                    <span class="nav-icon">🚪</span>
                    <span class="nav-text">Logout</span>
                </button>
            </div>
        </aside>

        <main class="content">
            <header>
                <h2>Profile Editor</h2>
                <p>Customize how others see you on EverythingTT.</p>
            </header>

            <section class="profile-editor-section">
                <div class="profile-preview">
                    <div id="profile-banner" class="banner"></div>
                    <div class="profile-header">
                        <div class="pfp-wrapper">
                            <img id="profile-pfp" class="pfp" src="" alt="PFP">
                            <div id="status-icon" class="status-icon"></div>
                        </div>
                        <div class="profile-names">
                            <div class="username-row">
                                <h4 id="profile-username-display"></h4>
                                <div id="status-bubble" class="status-bubble" style="display: none;"></div>
                                <div id="badge-container" class="badge-container"></div>
                            </div>
                            <small id="profile-id-display"></small>
                        </div>
                    </div>
                    <p id="profile-bio-display" class="bio"></p>
                </div>

                <div class="editor-fields">
                    <div class="input-group">
                        <label for="edit-username">Display Name</label>
                        <input type="text" id="edit-username" placeholder="Username" maxlength="100">
                    </div>
                    <div class="input-group">
                        <label for="upload-pfp">Profile Picture</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="upload-pfp" accept="image/jpeg,image/png,image/webp">
                            <small class="limit-hint">Max 2MB, no GIFs</small>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="upload-banner">Profile Banner</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="upload-banner" accept="image/jpeg,image/png,image/webp">
                            <small class="limit-hint">Max 2MB, no GIFs</small>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="edit-bio">Bio</label>
                        <textarea id="edit-bio" placeholder="Tell us about yourself..." maxlength="300"></textarea>
                    </div>
                    <div class="input-group">
                        <label for="edit-status">Status Message</label>
                        <input type="text" id="edit-status-msg" placeholder="What's on your mind?" maxlength="30">
                    </div>
                    <div class="input-group">
                        <label for="edit-status-type">Manual Status</label>
                        <select id="edit-status-type">
                            <option value="auto">Automatic (Online/Idle/Offline)</option>
                            <option value="dnd">Do Not Disturb</option>
                        </select>
                    </div>
                    <button id="btn-save-profile" class="save-btn">Save Changes</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Cropping Modal -->
    <div id="cropper-modal" class="modal">
        <div class="modal-content cropper-container">
            <div class="modal-header">
                <h3>Crop Image</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="cropper-wrapper">
                <img id="cropper-image" src="" alt="Source image">
            </div>
            <div class="modal-footer">
                <button id="btn-cancel-crop" class="btn-secondary">Cancel</button>
                <button id="btn-apply-crop" class="btn-primary">Apply Crop</button>
            </div>
        </div>
    </div>

    <script src="../utils.js"></script>
    <script src="../sidebar-shared.js"></script>
    <!-- Cropper.js for BETA cropping tool -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
