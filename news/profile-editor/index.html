<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - EverythingTT</title>
    <meta property="og:title" content="Profile Settings - EverythingTT" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://painsel.github.io/Everythingtt/news/profile-editor/" />
    <meta property="og:description" content="Customize your EverythingTT profile. Change your username, profile picture, and bio." />
    <meta name="theme-color" content="#5865f2">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container dashboard-container">
        <aside class="sidebar">
            <div class="user-info">
                <img id="side-pfp" src="" alt="PFP">
                <span id="side-username"></span>
            </div>
            <nav>
                <a href="../homepage/index.html" class="nav-item">Home</a>
                <a href="../articles/index.html" class="nav-item">Explore Articles</a>
                <a href="../create-article/index.html" class="nav-item">Create Article</a>
            </nav>
            <button id="btn-logout" class="logout-btn">Logout</button>
        </aside>

        <main class="content">
            <header>
                <h2>Profile Editor</h2>
                <p>Customize how others see you on EverythingTT.</p>
            </header>

            <section class="profile-editor-section">
                <div class="profile-preview">
                    <div id="profile-banner" class="banner"></div>
                    <div class="profile-header">
                        <div class="pfp-wrapper">
                            <img id="profile-pfp" class="pfp" src="" alt="PFP">
                            <div id="status-icon" class="status-icon"></div>
                        </div>
                        <div class="profile-names">
                            <div class="username-row">
                                <h4 id="profile-username-display"></h4>
                                <div id="status-bubble" class="status-bubble" style="display: none;"></div>
                                <div id="badge-container" class="badge-container"></div>
                            </div>
                            <small id="profile-id-display"></small>
                        </div>
                    </div>
                    <p id="profile-bio-display" class="bio"></p>
                </div>

                <div class="editor-fields">
                    <div class="input-group">
                        <label for="edit-username">Display Name</label>
                        <input type="text" id="edit-username" placeholder="Username" maxlength="100">
                    </div>
                    <div class="input-group">
                        <label for="upload-pfp">Profile Picture</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="upload-pfp" accept="image/jpeg,image/png,image/webp">
                            <small class="limit-hint">Max 2MB, no GIFs</small>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="upload-banner">Profile Banner</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="upload-banner" accept="image/jpeg,image/png,image/webp">
                            <small class="limit-hint">Max 2MB, no GIFs</small>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="edit-bio">Bio</label>
                        <textarea id="edit-bio" placeholder="Tell us about yourself..." maxlength="300"></textarea>
                    </div>
                    <div class="input-group">
                        <label for="edit-status">Status Message</label>
                        <input type="text" id="edit-status-msg" placeholder="What's on your mind?" maxlength="30">
                    </div>
                    <div class="input-group">
                        <label for="edit-status-type">Manual Status</label>
                        <select id="edit-status-type">
                            <option value="auto">Automatic (Online/Idle/Offline)</option>
                            <option value="dnd">Do Not Disturb</option>
                        </select>
                    </div>
                    <button id="btn-save-profile" class="save-btn">Save Changes</button>
                </div>
            </section>
        </main>
    </div>

    <script src="../utils.js?v=1.5.8"></script>
    <script src="script.js?v=1.1.1"></script>
</body>
</html>
