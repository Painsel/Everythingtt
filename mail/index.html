<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EverythingTT Mail</title>
    <link rel="icon" href="../logo/EverythingTT.png">
    <link rel="stylesheet" href="../news/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-bg-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="auth-card">
        <div class="auth-header">
            <img src="../logo/EverythingTT.png" alt="EverythingTT Logo" class="auth-logo">
            <h1>EverythingTT Mail</h1>
            <p id="auth-desc">Enter your mail credentials to continue</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login">Login</button>
            <button class="tab-btn" id="tab-signup">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="mail-login-form" class="auth-form">
            <div class="form-group">
                <label for="mail-email">Mail Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="mail-email" placeholder="user@ett.mail" required>
                </div>
            </div>

            <div class="form-group">
                <label for="mail-password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="mail-password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" id="btn-login" class="btn-primary">Login to Inbox</button>
        </form>

        <!-- Sign Up Form -->
        <form id="mail-signup-form" class="auth-form hidden">
            <div class="form-group">
                <label>Desired Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input type="text" id="new-mail-prefix" placeholder="username" required>
                    <span class="mail-suffix">@ett.mail</span>
                </div>
            </div>
            <div class="form-group">
                <label>Set Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="new-mail-password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-primary">Create Mailbox</button>
            <p class="form-notice">Requires an active EverythingTT News account.</p>
        </form>

        <div class="auth-footer">
            <a href="../news/homepage/index.html">Back to News Dashboard</a>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
