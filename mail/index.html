<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EverythingTT Mail</title>
    <link rel="icon" href="../logo/EverythingTT.png">
    <link rel="stylesheet" href="../news/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-bg-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="auth-card">
        <div class="auth-header">
            <img src="../logo/EverythingTT.png" alt="EverythingTT Logo" class="auth-logo">
            <h1>EverythingTT Mail</h1>
            <p id="auth-desc">Securely linked to your EverythingTT News account.</p>
        </div>

        <!-- Sign Up / Access Form -->
        <form id="mail-access-form" class="auth-form">
            <div id="signup-fields">
                <div class="form-group">
                    <label>Claim Your Official Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input type="text" id="new-mail-prefix" placeholder="username" required>
                        <span class="mail-suffix">@ett.mail</span>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Create & Access Mailbox</button>
            </div>

            <div id="access-fields" class="hidden">
                <div class="account-badge">
                    <span class="icon">📬</span>
                    <span id="existing-email-display"></span>
                </div>
                <button type="button" id="btn-enter-inbox" class="btn-primary">Enter Inbox</button>
            </div>
            
            <p class="form-notice">Your mailbox is permanently linked to your News ID.</p>
        </form>

        <div class="auth-footer">
            <a href="../news/homepage/index.html">Back to News Dashboard</a>
        </div>
    </main>

    <script src="../news/utils.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
