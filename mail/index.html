<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EverythingTT Mail</title>
    <meta property="og:title" content="EverythingTT Mail - Global Email Service" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://painsel.github.io/Everythingtt/mail/" />
    <meta property="og:description" content="Securely claim your @ett.mail address and access your global mailbox from anywhere." />
    <meta name="theme-color" content="#5865f2">
    <link rel="icon" href="../logo/EverythingTT.png">
    <link rel="stylesheet" href="../news/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-bg-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="auth-card">
        <div class="auth-header">
            <img src="../logo/EverythingTT.png" alt="EverythingTT Logo" class="auth-logo">
            <h1>EverythingTT Mail</h1>
            <p id="auth-desc">Securely linked to your EverythingTT News account.</p>
        </div>

        <!-- Sign Up / Access Form -->
        <form id="mail-access-form" class="auth-form">
            <div id="signup-fields">
                <div class="form-group">
                    <label>Claim Your Global Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🌍</span>
                        <input type="text" id="new-mail-prefix" placeholder="username" required>
                        <span class="mail-suffix">@ett.mail</span>
                    </div>
                    <p class="field-hint">Now with support for Gmail, Outlook, and more!</p>
                </div>
                <button type="submit" class="btn-primary">Create Global Mailbox</button>
            </div>

            <div id="access-fields" class="hidden">
                <div class="account-badge">
                    <span class="icon">📬</span>
                    <span id="existing-email-display"></span>
                </div>
                
                <div id="linked-emails-container" class="hidden">
                    <p class="field-hint" style="text-align: center; margin-bottom: 10px;">Switch to another linked email:</p>
                    <div id="linked-emails-list" class="linked-emails-grid">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <button type="button" id="btn-enter-inbox" class="btn-primary" style="margin-top: 15px;">Enter Inbox</button>
            </div>
            
            <p class="form-notice">Your mailbox is permanently linked to your News ID.</p>
        </form>

        <div class="auth-footer">
            <a href="../news/homepage/index.html">Back to News Dashboard</a>
        </div>
    </main>

    <script src="../news/utils.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
